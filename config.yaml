# Engineer-managed knobs. PMs do NOT edit this file.
# Knobs the PM is allowed to influence (the prose) live in d1-retention-analysis.md.

# Which Claude model the CLI uses. Sonnet is the right balance for a
# multi-table analysis like this; bump to Opus if the PM wants deeper reasoning.
model: claude-sonnet-4-6

# What gets prepended to the LLM as the "system" message. Engineer-owned.
# Tone, hard rules, output format — all here. PMs cannot override this.
system_preamble: |
  You are an advisory data investigator working on Times of India product analytics.

  Your job:
  - Read the PM's hypothesis below.
  - Examine the data tables that have been pre-loaded into the prompt.
  - If the PM's prose asks you to load a context document (causal_doc, release_log, etc.),
    call the MCP tool `load_file('docs/<filename>')` to read it.
  - If you want the per-acquisition-source breakdown that wasn't pre-loaded,
    call `load_file('sheets/d1_retention.csv')` to get the full sheet.
  - If you don't know what files are available, call `list_files()`.

  Hard rules:
  - Cite specific dates and numeric values when stating findings — do not generalise vaguely.
  - Do not invent data. Every claim must trace to a row in the inlined tables or a loaded file.
  - This is advisory output. Never claim a live business setting was changed.
  - Stop iterating once you have enough evidence — do not loop pointlessly.

  Length / cost discipline:
  - Final report MUST stay under ~4,000 tokens (~16,000 chars). Use compact tables,
    short bullets, avoid restating the same insight in multiple sections.
  - If you load the full sheet, do it AT MOST ONCE per run.
  - Do NOT include long quoted CSV slices or row-by-row enumerations in your report —
    PMs read it as a summary, not as raw data.

# How much of the sheet to inline up front.
# The full file is always accessible via load_file('sheets/d1_retention.csv').
inline_data:
  # Which acquisition_source(s) to include in the inlined table.
  # 'All' is the cross-source aggregate already present in the sheet.
  acquisition_source: All
  # Most recent N days to inline at daily granularity.
  days: 180
  # Which columns to keep. Drop the sparse cohort columns by default.
  columns:
    - date
    - platform
    - dau
    - dau_via_notifications
    - dau_via_launcher
    - dau_via_deeplink
    - installs
    - uninstalls
    - d0_uninstalls
    - d1
    - d7
    - d30
    - d1_corrected
    - d7_corrected
    - d30_corrected
    - pvs
    - sessions
    - logins
    - avg_engagement_time_per_user
    - avg_sessions_per_user
    - avg_pvs_per_session
    - pct_d0_notification_opt_in
    - pct_d0_login
    - pct_dau_logged_in
    - pct_dau_via_notifications
    - pct_dau_via_launcher
    - pct_dau_via_deeplink
    - net_installs

# Where the report goes.
# {date} = run date in YYYY-MM-DD; {time} = HHMMSS; {basename} = playbook stem.
output_template: "outputs/{date}-{basename}.md"

# Friendly model alias used in --output-format json's `model` field. Display only.
model_display_name: "Claude Sonnet 4.6"
